<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login - Coaching Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="flex items-center justify-center h-screen">
    <div class="login-form-card w-full max-w-md p-8 rounded-lg shadow-lg">
        <div class="text-center mb-8">
            <i class="fas fa-chalkboard-user text-4xl text-green-800"></i>
            <h1 class="text-3xl font-bold text-gray-800 mt-2">Teacher Portal Login</h1>
            <p class="text-gray-500">Please sign in to continue</p>
        </div>
        <form id="loginForm" data-validate>
            <div class="mb-4">
                <label for="username" class="block text-gray-700 font-semibold mb-2">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fas fa-user text-gray-400"></i>
                    </span>
                    <input type="text" id="username" name="username" class="w-full p-3 pl-10 border rounded-lg login-input-focus transition" placeholder="Enter your username" required>
                </div>
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3">
                        <i class="fas fa-lock text-gray-400"></i>
                    </span>
                    <input type="password" id="password" name="password" class="w-full p-3 pl-10 border rounded-lg login-input-focus transition" placeholder="Enter your password" required>
                </div>
            </div>
            <div id="errorMessage" class="hidden text-center p-3 mb-4 bg-red-100 text-red-700 rounded-lg">Invalid username or password.</div>
            <div id="successMessage" class="hidden text-center p-3 mb-4 bg-green-100 text-green-700 rounded-lg">Login successful! Redirecting...</div>
            <button type="submit" class="w-full btn-primary font-bold py-3 px-4 rounded-lg">Sign In</button>
        </form>
    </div>
    <script src="js/database.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');

            loginForm.addEventListener('submit', function(event) {
                event.preventDefault();
                handleLogin('teachers');
            });
        });
    </script>
</body>
</html>
